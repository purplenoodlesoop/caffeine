name: flutter_caffeine_example
description: Minimal example app for flutter_caffeine — two isolated counters via forked scopes, with a root-bound resetAll event.
publish_to: none

environment:
  sdk: ^3.11.1
  flutter: ">=3.10.0"

resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  caffeine:
    path: ../../caffeine
  flutter_caffeine:
    path: ../

dev_dependencies:
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
